version: '3.8'
services:
  db:
    image: postgres:15
    container_name: bot_db
    restart: always
    environment:
      POSTGRES_USER: bot_user
      POSTGRES_PASSWORD: bot_password
      POSTGRES_DB: bot_database
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: dir-bot-cont
    restart: always
    depends_on:
      - db
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/bot_database
      SPRING_DATASOURCE_USERNAME: bot_user
      SPRING_DATASOURCE_PASSWORD: bot_password
    ports:
      - "8080:8080"

volumes:
  pgdata:
